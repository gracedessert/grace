<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>grace</title>
    <!--
      Single Page Apps for GitHub Pages
      Redirects deep-link 404s back to index.html with the path encoded in the
      query string, where the snippet in index.html restores it.
      pathSegmentsToKeep = 1 keeps the "/grace/" project-page base.
      https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      (function (l) {
        var pathSegmentsToKeep = 1;
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname
              .split('/')
              .slice(0, 1 + pathSegmentsToKeep)
              .join('/') +
            '/?/' +
            l.pathname
              .slice(1)
              .split('/')
              .slice(pathSegmentsToKeep)
              .join('/')
              .replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
      })(window.location);
    </script>
  </head>
  <body></body>
</html>
